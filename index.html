<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fishing Simulator Deluxe</title>
  <style>
    * { box-sizing: border-box; user-select: none; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 0%, rgba(52, 152, 219, .35), transparent 45%),
        linear-gradient(180deg, #07111f 0%, #020712 100%);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    #wrap {
      width: min(96vw, 1510px);
      aspect-ratio: 1510 / 850;
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.55);
      border: 4px solid rgba(255, 255, 255, 0.18);
      background: #87ceeb;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }

    #help {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      color: white;
      font-size: clamp(12px, 1.05vw, 17px);
      text-shadow: 0 2px 8px rgba(0,0,0,0.75);
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255,255,255,0.22);
      padding: 9px 16px;
      border-radius: 999px;
      pointer-events: none;
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="1510" height="850"></canvas>
    <div id="help">Move mouse to aim • SPACE/click to shoot • Shop = upgrades • R = restart</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const WIDTH = 1510;
    const HEIGHT = 850;

    const game = {
      coins: 0,
      score: 0,
      bestCatch: "None",
      combo: 1,
      comboTimer: 0,
      shopOpen: false,
      waveOffset: 0,
      mouseX: 750,
      mouseY: 420,
      lastTime: 0,
      time: 0,
      fishCaught: 0,
      upgrades: {
        speed: { level: 1, baseCost: 50, label: "Harpoon Speed" },
        line: { level: 1, baseCost: 75, label: "Line Strength" },
        luck: { level: 1, baseCost: 120, label: "Rare Luck" },
        magnet: { level: 0, baseCost: 150, label: "Wide Hook" },
      }
    };

    const fishTypes = [
      { id: 1, name: "Common",    value: 5,    weight: 52, body: "#ff9f43", fin: "#ff6b35", minY: 250, speed: 2.7, w: 135, h: 68 },
      { id: 2, name: "Uncommon",  value: 12,   weight: 26, body: "#48dbfb", fin: "#0abde3", minY: 320, speed: 3.1, w: 145, h: 72 },
      { id: 3, name: "Rare",      value: 28,   weight: 13, body: "#a55eea", fin: "#8854d0", minY: 420, speed: 3.6, w: 155, h: 78 },
      { id: 4, name: "Epic",      value: 70,   weight: 6,  body: "#ff4757", fin: "#c44569", minY: 520, speed: 4.1, w: 210, h: 112 },
      { id: 5, name: "Legendary", value: 240,  weight: 2,  body: "#feca57", fin: "#ff9f43", minY: 625, speed: 4.5, w: 310, h: 170 },
      { id: 6, name: "Mythic",    value: 1100, weight: 1,  body: "#7bed9f", fin: "#2ed573", minY: 675, speed: 3.0, w: 245, h: 170 },
    ];

    const fishList = [];
    const bubbles = [];
    const particles = [];
    const texts = [];
    const ripples = [];

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function random(min, max) { return Math.random() * (max - min) + min; }
    function randomInt(min, max) { return Math.floor(random(min, max + 1)); }
    function chooseDirection() { return Math.random() < 0.5 ? -1 : 1; }

    function upgradeCost(key) {
      const u = game.upgrades[key];
      return Math.floor(u.baseCost * Math.pow(1.72, u.level - (key === "magnet" ? 0 : 1)));
    }

    function canAfford(key) { return game.coins >= upgradeCost(key); }

    function buyUpgrade(key) {
      if (!canAfford(key)) {
        spawnText("Need more coins", WIDTH / 2, 500, "#ff7675", 26);
        return;
      }
      game.coins -= upgradeCost(key);
      game.upgrades[key].level++;
      spawnText("UPGRADED!", WIDTH / 2, 500, "#55efc4", 32);
    }

    class Button {
      constructor(x, y, w, h, label, action) {
        this.x = x; this.y = y; this.w = w; this.h = h; this.label = label; this.action = action;
      }
      contains(mx, my) { return mx >= this.x && mx <= this.x + this.w && my >= this.y && my <= this.y + this.h; }
      draw(fill = "#0984e3", stroke = "rgba(255,255,255,0.65)", textSize = 28) {
        roundRect(this.x, this.y, this.w, this.h, 18, fill, stroke, 4);
        ctx.fillStyle = "white";
        ctx.font = `900 ${textSize}px monospace`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(this.label, this.x + this.w / 2, this.y + this.h / 2);
      }
    }

    class Fish {
      constructor(type, x = null, y = null) {
        this.type = type;
        this.x = x ?? (Math.random() < .5 ? random(-350, -60) : random(WIDTH + 60, WIDTH + 350));
        this.y = y ?? random(type.minY, Math.min(760, type.minY + 95));
        this.w = type.w * random(.9, 1.1);
        this.h = type.h * random(.9, 1.1);
        this.direction = this.x < 0 ? 1 : -1;
        this.speed = type.speed * random(.85, 1.2);
        this.bob = random(0, Math.PI * 2);
        this.caught = false;
        this.shimmer = type.id >= 5 ? random(0, Math.PI * 2) : 0;
      }

      get rect() { return { x: this.x, y: this.y, w: this.w, h: this.h }; }

      move(dt) {
        if (this.caught) return;
        this.bob += dt * 0.004;
        this.shimmer += dt * 0.006;
        this.x += this.direction * this.speed * dt * 0.06;
        this.y += Math.sin(this.bob) * 0.045 * dt;

        if (this.direction === 1 && this.x > WIDTH + this.w + 100) resetFish(this);
        if (this.direction === -1 && this.x < -this.w - 100) resetFish(this);
      }

      draw() {
        const c = this.type;
        const bobY = Math.sin(this.bob) * 4;
        ctx.save();
        ctx.translate(this.x + this.w / 2, this.y + this.h / 2 + bobY);
        ctx.scale(this.direction, 1);

        if (c.id >= 5) {
          ctx.shadowColor = c.id === 6 ? "rgba(126, 255, 159, .8)" : "rgba(255, 206, 87, .8)";
          ctx.shadowBlur = 24 + Math.sin(this.shimmer) * 6;
        } else {
          ctx.shadowColor = "rgba(0, 0, 0, 0.25)";
          ctx.shadowBlur = 9;
        }
        ctx.shadowOffsetY = 5;

        ctx.fillStyle = c.fin;
        ctx.beginPath();
        ctx.moveTo(-this.w * 0.48, 0);
        ctx.lineTo(-this.w * 0.74, -this.h * 0.33);
        ctx.lineTo(-this.w * 0.70, 0);
        ctx.lineTo(-this.w * 0.74, this.h * 0.33);
        ctx.closePath();
        ctx.fill();

        const grd = ctx.createLinearGradient(-this.w / 2, -this.h / 2, this.w / 2, this.h / 2);
        grd.addColorStop(0, "#ffffff");
        grd.addColorStop(0.18, c.body);
        grd.addColorStop(1, c.fin);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.ellipse(0, 0, this.w * 0.45, this.h * 0.42, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.globalAlpha = .25;
        ctx.fillStyle = "white";
        for (let i = -2; i <= 2; i++) {
          ctx.beginPath();
          ctx.ellipse(i * this.w * .11, 0, this.w * .032, this.h * .34, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        ctx.fillStyle = c.fin;
        ctx.beginPath();
        ctx.moveTo(-this.w * 0.03, -this.h * 0.05);
        ctx.lineTo(-this.w * 0.18, -this.h * 0.55);
        ctx.lineTo(this.w * 0.18, -this.h * 0.12);
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(-this.w * 0.02, this.h * 0.1);
        ctx.lineTo(-this.w * 0.18, this.h * 0.48);
        ctx.lineTo(this.w * 0.15, this.h * 0.17);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(this.w * 0.28, -this.h * 0.1, Math.max(5, this.h * 0.055), 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.arc(this.w * 0.3, -this.h * 0.1, Math.max(2.5, this.h * 0.027), 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        if (c.id >= 5) {
          ctx.save();
          ctx.globalAlpha = .8;
          ctx.fillStyle = "white";
          for (let i = 0; i < 2; i++) {
            const sx = this.x + random(0, this.w);
            const sy = this.y + random(0, this.h);
            star(sx, sy, 5, 5, 2);
          }
          ctx.restore();
        }
      }
    }

    class Harpoon {
      constructor() {
        this.startX = 750;
        this.startY = 150;
        this.x = 750;
        this.y = 150;
        this.w = 11;
        this.h = 104;
        this.status = "still";
        this.fishSpeared = null;
        this.trail = [];
      }

      get forwardSpeed() { return 9.4 + game.upgrades.speed.level * 1.25; }
      get backSpeed() { return -(6.0 + game.upgrades.line.level * 0.92); }
      get hookBonus() { return game.upgrades.magnet.level * 12; }

      launch() {
        if (this.status !== "still") return;
        this.status = "forward";
        this.fishSpeared = null;
        this.trail = [];
        ripples.push({ x: this.x, y: 192, r: 5, life: 1 });
      }

      update(dt) {
        if (this.status === "still") {
          this.x = clamp(game.mouseX, 180, WIDTH - 180);
          this.y = this.startY;
          return;
        }

        this.trail.push({ x: this.x, y: this.y + this.h, life: .55 });
        if (this.trail.length > 12) this.trail.shift();

        if (this.status === "forward") this.y += this.forwardSpeed * dt * 0.06;
        if (this.status === "back") this.y += this.backSpeed * dt * 0.06;

        if (this.y + this.h >= HEIGHT - 18) {
          this.status = "back";
          screenShake(5);
          ripples.push({ x: this.x, y: HEIGHT - 28, r: 8, life: 1 });
        }

        if (this.status === "back" && this.y <= this.startY) {
          this.status = "still";
          this.y = this.startY;
          if (this.fishSpeared) finishCatch(this.fishSpeared);
          this.fishSpeared = null;
        }

        if (!this.fishSpeared && this.status === "forward") {
          for (const fish of fishList) {
            if (!fish.caught && this.hitFish(fish)) {
              this.status = "back";
              fish.caught = true;
              this.fishSpeared = fish;
              screenShake(fish.type.id >= 5 ? 12 : 5);
              burst(fish.x + fish.w / 2, fish.y + fish.h / 2, fish.type.body, fish.type.id >= 5 ? 34 : 18);
              break;
            }
          }
        }

        if (this.fishSpeared) {
          this.fishSpeared.x = this.x - this.fishSpeared.w / 2;
          this.fishSpeared.y = this.y + this.h * 0.54;
        }
      }

      hitFish(fish) {
        const hx = this.x - (this.w / 2) - this.hookBonus;
        const hy = this.y;
        const hw = this.w + this.hookBonus * 2;
        const hh = this.h + 28;
        const r = fish.rect;
        return hx < r.x + r.w && hx + hw > r.x && hy < r.y + r.h && hy + hh > r.y;
      }

      draw() {
        ctx.save();
        for (const t of this.trail) {
          ctx.globalAlpha = t.life;
          ctx.strokeStyle = "rgba(255,255,255,.65)";
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.moveTo(t.x, t.y - 22);
          ctx.lineTo(t.x, t.y);
          ctx.stroke();
        }
        ctx.restore();

        ctx.strokeStyle = "rgba(0,0,0,.72)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(this.startX, this.startY);
        ctx.lineTo(this.x, this.y);
        ctx.stroke();

        ctx.strokeStyle = "rgba(255,255,255,.35)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(this.startX + 3, this.startY);
        ctx.lineTo(this.x + 3, this.y);
        ctx.stroke();

        ctx.save();
        ctx.translate(this.x, this.y);
        roundRect(-6, 0, 12, 105, 4, "#2f3542", "#111", 1);
        ctx.fillStyle = "#ced6e0";
        ctx.beginPath();
        ctx.moveTo(-16 - this.hookBonus * .25, 99);
        ctx.lineTo(0, 130);
        ctx.lineTo(16 + this.hookBonus * .25, 99);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#57606f";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();
      }
    }

    const harpoon = new Harpoon();
    let shake = 0;

    const shopButton = new Button(18, 72, 140, 68, "Shop", () => game.shopOpen = true);
    const closeButton = new Button(1234, 120, 58, 58, "X", () => game.shopOpen = false);
    const restartButton = new Button(18, 150, 140, 58, "Restart", restart);

    const upgradeButtons = {
      speed: new Button(350, 288, 360, 86, "", () => buyUpgrade("speed")),
      line: new Button(795, 288, 360, 86, "", () => buyUpgrade("line")),
      luck: new Button(350, 440, 360, 86, "", () => buyUpgrade("luck")),
      magnet: new Button(795, 440, 360, 86, "", () => buyUpgrade("magnet")),
    };

    function chooseFishType() {
      const luckBoost = Math.max(0, game.upgrades.luck.level - 1) * 0.28;
      const pool = fishTypes.map(t => ({ ...t, rollWeight: t.weight * (t.id >= 4 ? 1 + luckBoost * t.id : 1) }));
      const total = pool.reduce((sum, t) => sum + t.rollWeight, 0);
      let r = Math.random() * total;
      for (const type of pool) {
        r -= type.rollWeight;
        if (r <= 0) return fishTypes.find(f => f.id === type.id);
      }
      return fishTypes[0];
    }

    function spawnFish(x = null, y = null) {
      fishList.push(new Fish(chooseFishType(), x, y));
    }

    function resetFish(fish) {
      const fresh = new Fish(chooseFishType());
      Object.assign(fish, fresh);
    }

    function generateFish() {
      fishList.length = 0;
      for (let i = 0; i < 24; i++) {
        const type = chooseFishType();
        fishList.push(new Fish(type, random(0, WIDTH), random(type.minY, Math.min(760, type.minY + 105))));
      }
    }

    function finishCatch(fish) {
      const rarityBonus = fish.type.id >= 5 ? 2 : 1;
      const earned = Math.floor(fish.type.value * game.combo * rarityBonus);
      game.coins += earned;
      game.score += earned;
      game.fishCaught++;
      game.bestCatch = fish.type.name;
      game.combo = Math.min(6, +(game.combo + 0.25).toFixed(2));
      game.comboTimer = 3000;

      spawnText(`+${earned} coins`, fish.x + fish.w / 2, 140, fish.type.body, fish.type.id >= 5 ? 42 : 30);
      spawnText(`${fish.type.name}!`, WIDTH / 2, 225, fish.type.body, fish.type.id >= 5 ? 48 : 28);
      burst(fish.x + fish.w / 2, 150, fish.type.body, fish.type.id >= 5 ? 46 : 20);

      const index = fishList.indexOf(fish);
      if (index !== -1) fishList.splice(index, 1);
      while (fishList.length < 24) spawnFish();
    }

    function spawnText(text, x, y, color = "white", size = 28) {
      texts.push({ text, x, y, color, size, life: 1, vy: -0.55 });
    }

    function burst(x, y, color, count = 18) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: random(-4.5, 4.5),
          vy: random(-4.5, 3),
          r: random(2, 7),
          color,
          life: random(.45, 1),
        });
      }
    }

    function screenShake(amount) { shake = Math.max(shake, amount); }

    function makeBubbles(dt) {
      if (Math.random() < 0.08) {
        bubbles.push({ x: random(20, WIDTH - 20), y: HEIGHT + 20, r: random(3, 9), speed: random(.5, 1.8), alpha: random(.2, .65) });
      }
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        b.y -= b.speed * dt * .09;
        b.x += Math.sin((game.time + b.y) * .01) * .25;
        if (b.y < 210) bubbles.splice(i, 1);
      }
    }

    function updateEffects(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt * .08;
        p.y += p.vy * dt * .08;
        p.vy += .025 * dt;
        p.life -= .018 * dt;
        if (p.life <= 0) particles.splice(i, 1);
      }

      for (let i = texts.length - 1; i >= 0; i--) {
        const t = texts[i];
        t.y += t.vy * dt * .08;
        t.life -= .012 * dt;
        if (t.life <= 0) texts.splice(i, 1);
      }

      for (let i = ripples.length - 1; i >= 0; i--) {
        const r = ripples[i];
        r.r += dt * .25;
        r.life -= dt * .018;
        if (r.life <= 0) ripples.splice(i, 1);
      }

      if (game.comboTimer > 0) {
        game.comboTimer -= dt;
        if (game.comboTimer <= 0) game.combo = 1;
      }

      shake *= .9;
    }

    function roundRect(x, y, w, h, r, fill, stroke, lineWidth = 2) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lineWidth; ctx.stroke(); }
    }

    function star(x, y, points, outer, inner) {
      let rot = Math.PI / 2 * 3;
      const step = Math.PI / points;
      ctx.beginPath();
      ctx.moveTo(x, y - outer);
      for (let i = 0; i < points; i++) {
        ctx.lineTo(x + Math.cos(rot) * outer, y + Math.sin(rot) * outer);
        rot += step;
        ctx.lineTo(x + Math.cos(rot) * inner, y + Math.sin(rot) * inner);
        rot += step;
      }
      ctx.lineTo(x, y - outer);
      ctx.closePath();
      ctx.fill();
    }

    function drawBackground(dt) {
      const sky = ctx.createLinearGradient(0, 0, 0, HEIGHT);
      sky.addColorStop(0, "#9ce8ff");
      sky.addColorStop(0.22, "#7bd6ff");
      sky.addColorStop(0.38, "#38aeea");
      sky.addColorStop(1, "#033b73");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = "rgba(255, 236, 139, 0.92)";
      ctx.beginPath();
      ctx.arc(1320, 82, 46, 0, Math.PI * 2);
      ctx.fill();

      for (let i = 0; i < 4; i++) drawCloud(145 + i * 310, 74 + Math.sin(game.time * .001 + i) * 7, .78 + i * .06);

      game.waveOffset += dt * 0.035;
      drawWaterLayer(180, "rgba(0, 178, 255, 0.58)", 20, 0.85);
      drawWaterLayer(330, "rgba(0, 138, 220, 0.50)", 24, 1.05);
      drawWaterLayer(505, "rgba(0, 98, 190, 0.52)", 30, 1.23);
      drawWaterLayer(700, "rgba(0, 62, 148, 0.60)", 35, 1.45);

      ctx.fillStyle = "rgba(0,0,0,.08)";
      for (let y = 250; y < HEIGHT; y += 95) ctx.fillRect(0, y, WIDTH, 1);
    }

    function drawCloud(x, y, s) {
      ctx.save();
      ctx.globalAlpha = .65;
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(x, y, 30 * s, 0, Math.PI * 2);
      ctx.arc(x + 35 * s, y - 10 * s, 40 * s, 0, Math.PI * 2);
      ctx.arc(x + 80 * s, y, 32 * s, 0, Math.PI * 2);
      ctx.fillRect(x - 12 * s, y, 110 * s, 28 * s);
      ctx.restore();
    }

    function drawWaterLayer(y, color, amp, speed) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, HEIGHT);
      ctx.lineTo(0, y);
      for (let x = 0; x <= WIDTH + 40; x += 35) {
        const yy = y + Math.sin((x + game.waveOffset * speed) * 0.012) * amp;
        ctx.lineTo(x, yy);
      }
      ctx.lineTo(WIDTH, HEIGHT);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.30)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      for (let x = 0; x <= WIDTH + 40; x += 35) {
        const yy = y + Math.sin((x + game.waveOffset * speed) * 0.012) * amp;
        if (x === 0) ctx.moveTo(x, yy);
        else ctx.lineTo(x, yy);
      }
      ctx.stroke();
    }

    function drawBubbles() {
      for (const b of bubbles) {
        ctx.globalAlpha = b.alpha;
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function drawBoat() {
      ctx.save();
      ctx.translate(WIDTH / 2, 105);
      ctx.shadowColor = "rgba(0,0,0,0.32)";
      ctx.shadowBlur = 14;
      ctx.shadowOffsetY = 8;

      ctx.fillStyle = "#8b4513";
      ctx.beginPath();
      ctx.moveTo(-190, 38);
      ctx.lineTo(190, 38);
      ctx.lineTo(126, 112);
      ctx.lineTo(-126, 112);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#5c2f0e";
      roundRect(-125, 56, 250, 21, 8, "#5c2f0e", null, 0);
      ctx.fillStyle = "rgba(255,255,255,.15)";
      ctx.fillRect(-145, 42, 290, 8);

      roundRect(-66, -28, 132, 70, 14, "#f7f1e3", "#8b4513", 5);
      roundRect(-46, -10, 36, 30, 6, "#54a0ff", "#2e86de", 3);
      roundRect(12, -10, 36, 30, 6, "#54a0ff", "#2e86de", 3);

      ctx.fillStyle = "#3d2b1f";
      ctx.fillRect(-6, -88, 12, 75);
      ctx.fillStyle = "#ffdd59";
      ctx.beginPath();
      ctx.moveTo(8, -85);
      ctx.lineTo(82, -48);
      ctx.lineTo(8, -18);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawHUD() {
      panel(16, 16, 330, 48);
      coinIcon(41, 40);
      ctx.fillStyle = "white";
      ctx.font = "900 32px monospace";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(game.coins.toLocaleString(), 72, 40);

      ctx.font = "700 20px monospace";
      ctx.fillStyle = "rgba(255,255,255,.86)";
      ctx.fillText(`Score: ${game.score.toLocaleString()}`, 190, 40);

      shopButton.draw("#0fbcf9", "rgba(255,255,255,0.75)", 28);
      restartButton.draw("#57606f", "rgba(255,255,255,0.35)", 20);

      panel(WIDTH - 345, 16, 329, 102);
      ctx.fillStyle = "white";
      ctx.font = "900 22px monospace";
      ctx.textAlign = "left";
      ctx.fillText(`Combo: x${game.combo.toFixed(2)}`, WIDTH - 322, 44);
      ctx.fillText(`Caught: ${game.fishCaught}`, WIDTH - 322, 74);
      ctx.fillStyle = "rgba(255,255,255,.78)";
      ctx.font = "700 18px monospace";
      ctx.fillText(`Best: ${game.bestCatch}`, WIDTH - 322, 101);

      if (game.comboTimer > 0) {
        ctx.fillStyle = "rgba(255,255,255,.25)";
        roundRect(WIDTH - 165, 34, 120, 12, 6, "rgba(255,255,255,.25)", null, 0);
        roundRect(WIDTH - 165, 34, 120 * (game.comboTimer / 3000), 12, 6, "#55efc4", null, 0);
      }
    }

    function panel(x, y, w, h) {
      roundRect(x, y, w, h, 16, "rgba(0,0,0,.24)", "rgba(255,255,255,.18)", 2);
    }

    function coinIcon(x, y) {
      ctx.fillStyle = "#feca57";
      ctx.beginPath();
      ctx.arc(x, y, 22, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#ff9f43";
      ctx.lineWidth = 5;
      ctx.stroke();
      ctx.fillStyle = "#8a5a00";
      ctx.font = "900 24px monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("$", x, y + 1);
    }

    function drawShop() {
      if (!game.shopOpen) return;
      ctx.fillStyle = "rgba(0, 0, 0, 0.48)";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      roundRect(190, 92, 1130, 666, 34, "#1477d4", "rgba(255,255,255,0.70)", 6);
      roundRect(225, 132, 1060, 590, 26, "rgba(255,255,255,0.12)", "rgba(255,255,255,0.16)", 2);

      ctx.fillStyle = "white";
      ctx.font = "900 58px monospace";
      ctx.textAlign = "center";
      ctx.fillText("Upgrade Shop", WIDTH / 2, 182);

      ctx.font = "700 24px monospace";
      ctx.fillStyle = "rgba(255,255,255,.88)";
      ctx.fillText("Buy upgrades to catch faster fish and earn huge combos.", WIDTH / 2, 230);

      drawUpgradeCard("speed", "Shoots deeper and faster");
      drawUpgradeCard("line", "Returns fish faster");
      drawUpgradeCard("luck", "More Epic/Legendary/Mythic fish");
      drawUpgradeCard("magnet", "Makes the hook wider");

      closeButton.draw("#ff4757", "rgba(255,255,255,0.75)", 30);
    }

    function drawUpgradeCard(key, desc) {
      const b = upgradeButtons[key];
      const u = game.upgrades[key];
      const affordable = canAfford(key);
      b.draw(affordable ? "#2ed573" : "#747d8c", "rgba(255,255,255,0.56)", 1);

      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillStyle = "white";
      ctx.font = "900 27px monospace";
      ctx.fillText(u.label, b.x + 22, b.y + 14);
      ctx.font = "700 18px monospace";
      ctx.fillStyle = "rgba(255,255,255,.84)";
      ctx.fillText(desc, b.x + 22, b.y + 48);

      ctx.textAlign = "right";
      ctx.fillStyle = "#fff";
      ctx.font = "900 22px monospace";
      ctx.fillText(`Lv. ${u.level}`, b.x + b.w - 24, b.y + 16);
      ctx.fillStyle = affordable ? "#083d21" : "#f1f2f6";
      ctx.font = "900 20px monospace";
      ctx.fillText(`$${upgradeCost(key)}`, b.x + b.w - 24, b.y + 52);
    }

    function drawEffects() {
      for (const r of ripples) {
        ctx.globalAlpha = r.life;
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(r.x, r.y, r.r * 2.4, r.r * .7, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const t of texts) {
        ctx.globalAlpha = Math.max(0, t.life);
        ctx.fillStyle = t.color;
        ctx.font = `900 ${t.size}px monospace`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.lineWidth = 5;
        ctx.strokeStyle = "rgba(0,0,0,.45)";
        ctx.strokeText(t.text, t.x, t.y);
        ctx.fillText(t.text, t.x, t.y);
      }
      ctx.globalAlpha = 1;
    }

    function update(dt) {
      game.time += dt;
      makeBubbles(dt);
      for (const fish of fishList) fish.move(dt);
      harpoon.update(dt);
      updateEffects(dt);
    }

    function draw() {
      ctx.save();
      if (shake > .5) ctx.translate(random(-shake, shake), random(-shake, shake));

      drawBackground(16);
      drawBubbles();
      drawBoat();
      for (const fish of fishList) fish.draw();
      harpoon.draw();
      drawEffects();
      drawHUD();
      drawShop();

      ctx.restore();
    }

    function gameLoop(timestamp) {
      const dt = Math.min(33, timestamp - game.lastTime || 16);
      game.lastTime = timestamp;
      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    function getMousePos(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * (canvas.width / rect.width),
        y: (event.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function handleClick(event) {
      const { x, y } = getMousePos(event);
      if (game.shopOpen) {
        if (closeButton.contains(x, y)) closeButton.action();
        for (const key in upgradeButtons) {
          if (upgradeButtons[key].contains(x, y)) upgradeButtons[key].action();
        }
        return;
      }
      if (shopButton.contains(x, y)) return shopButton.action();
      if (restartButton.contains(x, y)) return restartButton.action();
      harpoon.launch();
    }

    function restart() {
      game.coins = 0;
      game.score = 0;
      game.combo = 1;
      game.comboTimer = 0;
      game.fishCaught = 0;
      game.bestCatch = "None";
      game.shopOpen = false;
      for (const key in game.upgrades) game.upgrades[key].level = key === "magnet" ? 0 : 1;
      harpoon.status = "still";
      harpoon.y = harpoon.startY;
      generateFish();
      spawnText("Restarted", WIDTH / 2, 260, "white", 34);
    }

    canvas.addEventListener("mousemove", (event) => {
      const pos = getMousePos(event);
      game.mouseX = pos.x;
      game.mouseY = pos.y;
    });

    canvas.addEventListener("click", handleClick);

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        if (!game.shopOpen) harpoon.launch();
      }
      if (event.code === "Escape") game.shopOpen = false;
      if (event.code === "KeyR") restart();
    });

    generateFish();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
